<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Employee Expert System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .auth-divider { text-align: center; color: var(--text-muted); font-size: 0.8rem; margin: 1rem 0; position: relative; }
    .auth-divider::before, .auth-divider::after { content: ''; position: absolute; top: 50%; width: 42%; height: 1px; background: var(--border); }
    .auth-divider::before { left: 0; } .auth-divider::after { right: 0; }
    .demo-creds { background: var(--bg-secondary); border-radius: var(--radius-sm); padding: 0.75rem 1rem; font-size: 0.8rem; color: var(--text-secondary); margin-top: 1rem; }
    .demo-creds strong { display: block; color: var(--text-primary); margin-bottom: 0.25rem; }
    .demo-creds p { margin-bottom: 2px; }
    .page-hidden { display: none; }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon">💼</div>
        <div>
          <h1>ExpertSystem</h1>
          <p>Task Management Platform</p>
        </div>
      </div>

      <!-- Tab switch -->
      <div class="auth-tab-group">
        <button class="auth-tab active" onclick="switchTab('login')">Sign In</button>
        <button class="auth-tab" onclick="switchTab('signup')">Sign Up</button>
      </div>

      <!-- LOGIN FORM -->
      <div id="login-form">
        <h2 class="auth-title">Welcome back</h2>
        <p class="auth-subtitle">Sign in to your account</p>
        <form onsubmit="handleLogin(event)">
          <div class="form-group">
            <label>Email address</label>
            <input type="email" id="login-email" class="form-control" placeholder="you@company.com" required />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="login-password" class="form-control" placeholder="••••••••" required />
          </div>
          <button type="submit" id="login-btn" class="btn btn-primary btn-full" style="margin-top:0.5rem">Sign In →</button>
        </form>
        <div class="demo-creds">
          <strong>🚀 Demo Credentials</strong>
          <p><b>Manager:</b> manager@demo.com / demo1234</p>
          <p><b>Employee:</b> employee@demo.com / demo1234</p>
        </div>
      </div>

      <!-- SIGNUP FORM -->
      <div id="signup-form" class="page-hidden">
        <h2 class="auth-title">Create account</h2>
        <p class="auth-subtitle">Join your team workspace</p>
        <form onsubmit="handleSignup(event)">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="signup-name" class="form-control" placeholder="John Doe" required />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Email</label>
              <input type="email" id="signup-email" class="form-control" placeholder="you@company.com" required />
            </div>
            <div class="form-group">
              <label>Department</label>
              <input type="text" id="signup-dept" class="form-control" placeholder="Engineering" />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Password</label>
              <input type="password" id="signup-password" class="form-control" placeholder="••••••••" required minlength="6" />
            </div>
            <div class="form-group">
              <label>Role</label>
              <select id="signup-role" class="form-control">
                <option value="employee">Employee</option>
                <option value="manager">Manager</option>
              </select>
            </div>
          </div>
          <button type="submit" id="signup-btn" class="btn btn-primary btn-full" style="margin-top:0.5rem">Create Account →</button>
        </form>
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script>
    // Redirect if already logged in
    if (auth.isLoggedIn()) {
      window.location.href = auth.isManager() ? 'manager-dashboard.html' : 'employee-dashboard.html';
    }

    function switchTab(tab) {
      document.querySelectorAll('.auth-tab').forEach((t, i) => {
        t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'signup'));
      });
      document.getElementById('login-form').classList.toggle('page-hidden', tab !== 'login');
      document.getElementById('signup-form').classList.toggle('page-hidden', tab !== 'signup');
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      ui.setLoading(btn, true);
      try {
        const res = await api.post('/auth/login', {
          email: document.getElementById('login-email').value,
          password: document.getElementById('login-password').value,
        });
        auth.save(res.token, res.user);
        ui.toast('Welcome back, ' + res.user.name + '!', 'success');
        setTimeout(() => {
          window.location.href = res.user.role === 'manager' ? 'manager-dashboard.html' : 'employee-dashboard.html';
        }, 600);
      } catch (err) {
        ui.toast(err.message || 'Login failed', 'error');
        ui.setLoading(btn, false);
      }
    }

    async function handleSignup(e) {
      e.preventDefault();
      const btn = document.getElementById('signup-btn');
      ui.setLoading(btn, true);
      try {
        const res = await api.post('/auth/register', {
          name: document.getElementById('signup-name').value,
          email: document.getElementById('signup-email').value,
          password: document.getElementById('signup-password').value,
          role: document.getElementById('signup-role').value,
          department: document.getElementById('signup-dept').value,
        });
        auth.save(res.token, res.user);
        ui.toast('Account created!', 'success');
        setTimeout(() => {
          window.location.href = res.user.role === 'manager' ? 'manager-dashboard.html' : 'employee-dashboard.html';
        }, 600);
      } catch (err) {
        ui.toast(err.message || 'Signup failed', 'error');
        ui.setLoading(btn, false);
      }
    }
  </script>
</body>
</html>
